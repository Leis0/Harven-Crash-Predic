<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harven Crash Predic</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Background -->
    <div class="background">
        <div class="circle c1"></div>
        <div class="circle c2"></div>
        <div class="circle c3"></div>
    </div>

    <div class="container">

        <!-- Logo -->
        <div class="logo">
            <h1>HARVEN<span>CRASH PREDIC</span></h1>
            <p>Prédiction de cote Safe Crash</p>
        </div>

        <!-- Card principale -->
        <div class="card">

            <div class="label">
                Multiplicateur Safe
            </div>

            <div id="multiplier" class="multiplier">
                1.00x
            </div>

            <button id="generateBtn">
                Générer
            </button>

            <div id="loading" class="loading hidden">
                Génération...
            </div>

        </div>

        <!-- Statistiques -->
        <div class="stats">

            <div class="stat">
                <span>Moyenne</span>
                <h3 id="average">0.00x</h3>
            </div>

            <div class="stat">
                <span>Maximum</span>
                <h3 id="highest">0.00x</h3>
            </div>

            <div class="stat">
                <span>Générations</span>
                <h3 id="count">0</h3>
            </div>

        </div>

        <!-- Historique -->
        <div class="history-card">

            <h2>Historique</h2>

            <div id="history" class="history">

                <!-- Ajout automatique par JavaScript -->

            </div>

        </div>

    </div>

    <!-- Footer -->
    <footer>
        <p>
            +22893501438 pour plus de bot de prédiction de cote.
    </footer>

    <script src="script.js"></script>

</body>
</html>
